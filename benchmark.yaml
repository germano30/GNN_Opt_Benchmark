experiment:
  runs: 1            # Numero de seeds diferentes para rodar
  epochs: 500         # Epocas de treinamento por seed
  patience: 100        # Early Stopping: Para se o Validation Score nao melhorar em N epocas
  batch_size: 4096    # Reduzido para evitar OOM com RGAT (subgrafos menores)

hyperparameters:
  lr: 0.001
  weight_decay: 0.00001
  hidden_channels: 256
  num_layers: 3
  dropout: 0.3
  num_neighbors: 30
  grad_accum_steps: 2   # Compensa batch menor: efetivo ~128*8=1024

targets:
  datasets:
    - ogbg-ppa
  models:
    - GCN
    - GAT
    - GIN_none
    - GIN_layer
    - GIN_batch 
  optimizers:
    - Muon
    - SOAP
    - AdamW
    - Shampoo
    - SGD
